name = "telegram-bot-router"
compatibility_date = "2024-04-19"
main = "src/index.ts"

[[services]]
binding = "BACKEND"
service = "tax-payment-backend"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1